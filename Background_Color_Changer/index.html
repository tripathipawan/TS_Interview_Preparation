<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Color Changer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#015176] w-full h-screen flex justify-center items-center transition-bg duration-300">
  <div class="border-2 border-[#fff] rounded p-4 flex justify-between bg-blue-500">
    <div
      class="btn text-white p-3 mx-2 border-2 rounded bg-red-500 hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
      Red</div>
    <div
      class="btn text-white p-3 mx-2 border-2 rounded bg-black hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
      Black</div>
    <div
      class="btn text-white p-3 mx-2 border-2 rounded bg-pink-500 hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
      Pink</div>
    <div
      class="btn text-white p-3 mx-2 border-2 rounded bg-orange-500 hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
      Orange</div>
    <div
      class="btn text-white p-3 mx-2 border-2 rounded bg-green-800 hover:bg-white hover:text-black transition-all duration-500 cursor-pointer">
      Green</div>
  </div>


  <script src="script.js"></script>
</body>

</html>
