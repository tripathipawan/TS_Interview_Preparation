<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Clock </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
  </style>
</head>

<body class="bg-[#00080f] h-screen w-full flex items-center justify-center">
  <div class="bg-[#041f39] border-2 rounded-lg border-[#c7d5e3] p-4 text-[2rem] text-[#c7d5e3] font-bold">
    <div class="date">
      <span id="day">??</span> /
      <span id="month">??</span> /
      <span id="year">??</span>
    </div>
    <div class="time">
      <span id="hour">??</span> :
      <span id="minute">??</span> :
      <span id="second">??</span>
      <span id="period">??</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
