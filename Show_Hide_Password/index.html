<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show_Hide_Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
  </style>
</head>

<body class="w-full h-screen flex justify-center items-center bg-[#0b000f]">
  <div class="border-2 border-[#7e00a8] rounded p-5 bg-[#973ab6] flex">
    <input type="password" placeholder="Enter your password..." id="input-box" class="p-2 bg-[#0b000f] text-[#cf9ddf] rounded-tl-lg rounded-bl-lg font-bold text-[1.2rem]">
    <button id="btn" class="border-2 border-[#0b000f] px-8 py-4 font-bold text-[1.2rem] text-black bg-[#cf9ddf] rounded-tr-lg rounded-br-lg h-[60px] cursor-pointer transition-all hover:text-[#cf9ddf] hover:bg-[#0b000f] hover:border-[#cf9ddf] duration-300 active:bg-[#cf9ddf] active:text-[#0b000f] active:scaleX-(1.2)">
      Show
    </button>
  </div>


  <script src="script.js"></script>

</body>

</html>
