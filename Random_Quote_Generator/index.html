<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: Georgia, 'Times New Roman', Times, serif;
    }
  </style>
</head>

<body class="w-full h-screen flex justify-center items-center bg-[#0b000f]">
  <div class="w-[80%] max-w-[500px] border-2 border-[#7e00a8] rounded p-5 bg-[#973ab6] flex flex-col">
    <p id="quote" class="text-[1.2rem] font-bold">"The only way to do great work is to love what you do."</p>
    <span id="writer" class="text-end mb-5 font-bold">- Steve Jobs </span>
    <button id="btn" class="border-2 border-[#0b000f] px-8 py-4 font-bold text-[1.2rem] text-black bg-[#cf9ddf] rounded-lg h-[60px] cursor-pointer transition-all hover:text-[#cf9ddf] hover:bg-[#0b000f] hover:border-[#cf9ddf] duration-500 active:bg-[#cf9ddf] active:text-[#0b000f] active:scale-(.85)">
      New Quote
    </button>
  </div>


  <script src="script.js"></script>

</body>

</html>
